<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            :root {
                --font-size: 16px;
                --printed-font-size: 12px;
                --font-family: Calibri;
                --left-column-width: 400px;
                --left-column-color: gainsboro;
                --right-column-color: blue;
                --avatar-border-width: 25px;
                --avatar-padding: 40px;
                --info-icon-width: 30px;
                --info-icon-height: 30px;
                font-size: var(--font-size);
            }

            body {
                margin: 0px;
                color: var(--text-color);
                font-family: var(--font-family);
            }

            .left-column {
                position: absolute;
                left: 0;
                right: 0;
                height: 100%;
                width: var(--left-column-width);
                background-color: var(--left-column-color);
            }

            .left-column h1, .left-column h2 {
                    margin-left: 30px;
                }

            .right-column {
                position: absolute;
                right: 0;
                height: 100%;
                left: var(--left-column-width);
                background-color: var(--right-column-color);
            }

            .avatar-container {
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: var(--left-column-width);
                width: var(--left-column-width);
            }

            .avatar {
                --a: calc(var(--avatar-border-width) * 3);

                border-radius: 50%;
                height: calc(100% - (var(--avatar-border-width) * 2) - (var(--avatar-padding) * 2));
                width: calc(100% - (var(--avatar-border-width) * 2) - (var(--avatar-padding) * 2));
                border: var(--avatar-border-width) solid white;
            }

            .info {
                display: flex;
                justify-content: left;
                align-items: center;
                margin: 30px;
            }

            .info .svg {
                width: 30px;
                margin-right: 30px;
            }

            .info-detail {

            }

        </style>

    </head>

    <body>

        <div class="left-column">

            <div class="avatar-container">
                <img class="avatar" src="C:\Users\agart\OneDrive\Pictures\Profile Pics\me.jpg" alt="Avatar">
            </div>

            <h1>Adam Gartee</h1>
            <h2>Software Developer</h2>

            <div class="info">
                <object class="svg" type="image/svg+xml" data="svg/home.svg"></object>
                <div class="info-detail">
                    9305 Tiger Run Trail<br />Davison, MI 48423
                </div>
            </div>

            <div class="info">
                <object class="svg" type="image/svg+xml" data="svg/github.svg"></object>
                <div class="info-detail">
                    https://github.com/agartee
                </div>
            </div>

            <div class="info">
                <object class="svg" type="image/svg+xml" data="svg/email.svg"></object>
                <div class="info-detail">
                    agartee@gmail.com
                </div>
            </div>

            <div class="info">
                <object class="svg" type="image/svg+xml" data="svg/linkedin.svg"></object>
                <div class="info-detail">
                    https://www.linkedin.com/in/adamgartee
                </div>
            </div>

            <div class="info">
                <object class="svg" type="image/svg+xml" data="svg/twitter.svg"></object>
                <div class="info-detail">
                    @adamgartee
                </div>
            </div>
            
        </div>

        <div class="right-column">

            <h1>Work Experience</h1>



        </div>

        
        
    </body>

</html>
